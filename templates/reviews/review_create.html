{% block content %}

    <div class="col-md-6">

        <h4 class="mb-3">Leave a Review</h4>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            <button class="btn btn-primary">
                Submit Review
            </button>
        </form>

    </div>
</div>

{% endblock %}
